<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <style>
    body { font-family: system-ui; max-width: 500px; margin: 50px auto; padding: 20px; }
    h1 { color: #333; }
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; gap: 10px; }
    li.completed span { text-decoration: line-through; color: #888; }
    span { flex: 1; }
    .delete { background: #dc3545; }
    .delete:hover { background: #c82333; }
    .toggle { background: #28a745; }
    .toggle:hover { background: #218838; }
  </style>
</head>
<body>
  <h1>Todo List</h1>
  <div class="input-group">
    <input type="text" id="todoInput" placeholder="Add a new todo..." />
    <button onclick="addTodo()">Add</button>
  </div>
  <ul id="todoList"></ul>

  <script>
    const API = "http://localhost:3001/todos";

    async function loadTodos() {
      const res = await fetch(API);
      const todos = await res.json();
      const list = document.getElementById("todoList");
      list.innerHTML = todos.map(t => `
        <li class="${t.completed ? 'completed' : ''}">
          <span>${t.text}</span>
          <button class="toggle" onclick="toggleTodo(${t.id})">${t.completed ? 'Undo' : 'Done'}</button>
          <button class="delete" onclick="deleteTodo(${t.id})">Delete</button>
        </li>
      `).join("");
    }

    async function addTodo() {
      const input = document.getElementById("todoInput");
      if (!input.value.trim()) return;
      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: input.value })
      });
      input.value = "";
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/${id}`, { method: "DELETE" });
      loadTodos();
    }

    async function toggleTodo(id) {
      await fetch(`${API}/${id}`, { method: "POST" });
      loadTodos();
    }

    document.getElementById("todoInput").addEventListener("keypress", e => {
      if (e.key === "Enter") addTodo();
    });

    loadTodos();
  </script>
</body>
</html>
