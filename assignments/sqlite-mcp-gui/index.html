<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cheapspaces - Fast, affordable Hetzner development environments with instant provisioning and AI-powered insights." />
    <meta name="theme-color" content="#0f172a" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https: wss:; font-src 'self' data: https: https://fonts.gstatic.com;" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cheapspaces - Hetzner Development Environments" />
    <meta property="og:description" content="Fast, affordable Hetzner development environments with instant provisioning and AI-powered insights." />
    <!-- <meta property="og:image" content="/og-image.png" /> -->

    <!-- Title -->
    <title>Cheapspaces - Hetzner Development Environments</title>

    <!-- Favicon and PWA assets disabled for Bun build compatibility -->


    <!-- Preconnect for external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.hetzner.cloud" />

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />

    <!-- Main CSS -->
    <link rel="stylesheet" href="/workspace/apps/Frontend/browser-client/main.css" />

    <!-- Inline critical CSS for preventing FOUC -->
    <style>
      :root {
        --color-primary: #3b82f6;
        --color-primary-dark: #2563eb;
        --color-secondary: #8b5cf6;
        --color-background: #ffffff;
        --color-surface: #f8f9fa;
        --color-surface-elevated: #e9ecef;
        --color-border: #dee2e6;
        --color-text: #212529;
        --color-text-secondary: #495057;
        --color-text-muted: #6c757d;
        --color-success: #22c55e;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --color-info: #06b6d4;
        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        --shadow-sm: 0 1px 2px rgb(0 0 0 / 0.3);
        --shadow-md: 0 4px 6px rgb(0 0 0 / 0.3);
        --shadow-lg: 0 10px 15px rgb(0 0 0 / 0.3);
        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
        --radius-xl: 12px;
      }

      *, *::before, *::after {
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: var(--font-sans);
        background-color: var(--color-background);
        color: var(--color-text);
        line-height: 1.5;
      }

      #root {
        min-height: 100vh;
      }

      /* Loading spinner */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loading-spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 3px solid #dee2e6;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      /* Loading skeleton */
      .skeleton {
        background: linear-gradient(90deg, var(--color-surface) 25%, var(--color-surface-elevated) 50%, var(--color-surface) 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s ease-in-out infinite;
      }

      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>

    <!-- Structured data for search engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Cheapspaces",
      "description": "Fast, affordable Hetzner development environments with instant provisioning and AI-powered insights.",
      "url": "https://cheapspaces.dev",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      }
    }
    </script>
  </head>
  <body>
    <!-- Root element for React -->
    <div id="root"></div>

    <!-- Error boundary container -->
    <div id="error-boundary" style="display: none;"></div>

    <!-- Loading indicator (shown before React hydrates) -->
    <div id="initial-loader" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
      <div class="loading-spinner"></div>
    </div>

    <!-- Noscript fallback -->
    <noscript>
      <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; text-align: center;">
        <div>
          <h1 style="color: #ef4444; margin-bottom: 1rem;">JavaScript Required</h1>
          <p style="color: #6c757d;">Cheapspaces requires JavaScript to function. Please enable JavaScript in your browser and reload the page.</p>
        </div>
      </div>
    </noscript>

    <!-- Service worker registration for PWA -->
    <!-- <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(
            (registration) => {
              console.log('Service Worker registered:', registration.scope);
            },
            (error) => {
              console.log('Service Worker registration failed:', error);
            }
          );
        });
      }
    </script> -->

    <!-- Analytics (deferred) -->
    <!-- <script defer src="/analytics.js"></script> -->

    <!-- Main React application -->
    <script type="module" src="/workspace/apps/Frontend/browser-client/main.tsx"></script>

    <!-- Script to hide initial loader when React mounts -->
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.display = 'none';
        }
      });
    </script>
  </body>
</html>
