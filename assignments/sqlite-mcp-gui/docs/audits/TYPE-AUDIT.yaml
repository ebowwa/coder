# ============================================================================
# FRONTEND TYPE PATTERNS (app/browser-client/)
# ============================================================================
frontend:
  description: Frontend components import types from app/shared/types.ts
  patterns:
    - Use Environment from shared for core domain types
    - Define local interfaces for component state
    - Define response interfaces for API calls
    - Use React prop interfaces for component props

  hooks:
    useAppState_ts:
      path: app/browser-client/hooks/useAppState.ts
      types:
        - name: FileListItem
          properties:
            - name: string
            - path: string
            - size: number
            - modified: string
            - type: string
        - name: Notification
          properties:
            - id: string
            - message: string
            - type: "info" | "success" | "error" | "warning"
            - duration: number

    useHetznerData_ts:
      path: app/browser-client/hooks/useHetznerData.ts
      types:
        - name: ServerTypesResponse
          properties:
            - success: boolean
            - serverTypes: HetznerServerType[]
            - error?: string
        - name: LocationsResponse
          properties:
            - success: boolean
            - locations: HetznerLocation[]
            - error?: string
      shared_types_used:
        - HetznerServerType
        - HetznerLocation

    useEnvironmentsApi_ts:
      path: app/browser-client/hooks/useEnvironmentsApi.ts
      types:
        - name: EnvironmentsResponse
          properties:
            - success: boolean
            - environments: Environment[]
            - error?: string
        - name: ScreenshotResponse
          properties:
            - success: boolean
            - path?: string
            - error?: string
      shared_types_used:
        - Environment

  lib:
    hetznerActionPolling_ts:
      path: app/browser-client/lib/hetznerActionPolling.ts
      types:
        - name: HetznerAction
          mirrors: backend type
        - name: ActionPollingOptions
          properties:
            - interval: number
            - timeout: number
            - callbacks: {onProgress?, onComplete?, onError?}

# ============================================================================
# TYPE ORGANIZATION ARCHITECTURE
# ============================================================================
architecture:
  tiers:
    tier1_truly_shared:
      path: app/shared/
      files:
        - types.ts (412 lines)
        - constants.ts (94 lines)
        - validation.ts (99 lines)
      description: Domain types shared by frontend and backend

    tier2_backend_schemas:
      path: app/backend/shared/lib/schemas/
      files:
        - api.ts (345 lines)
        - ai.ts (502 lines)
        - database.ts (103 lines)
        - ssh.ts (58 lines)
        - glm.ts (37 lines)
      description: API request/response schemas with Zod validation

    tier3_backend_modules:
      path: app/backend/shared/lib/
      modules:
        - hetzner/types.ts (395 lines)
        - ssh/types.ts (19 lines)
        - terminal/sessions.ts (431 lines)
        - ai/types.ts (25 lines, re-exports)
        - claudecodesdk/types.ts (170 lines)

  patterns:
    zod_integration:
      description: Define Zod schema, export inferred type
      example: |
        export const SchemaName = z.object({...})
        export type SchemaName = z.infer<typeof SchemaName>

    reexports:
      description: Backend modules re-export from schemas
      example: ai/types.ts re-exports all from schemas/ai.ts

    provider_separation:
      description: Generic schemas separate from provider-specific
      example: ai.ts (generic) vs glm.ts (provider-specific)

    central_hub:
      description: Frontend imports from app/shared/types.ts
      avoids: Circular dependencies

# ============================================================================
# TYPE COVERAGE SUMMARY
# ============================================================================
coverage:
  full_coverage_areas:
    - Hetzner Cloud API integration
    - SSH operations (connection, SCP, terminal)
    - AI/LLM integration (multiple providers)
    - Database operations
    - API requests/responses
    - Environment lifecycle
    - Metrics and monitoring

  type_safety_features:
    - Zod runtime validation
    - Strict null checks
    - Enum usage for fixed values
    - Optional properties clearly marked
    - Union types for status/state

  statistics:
    total_interfaces: ~80
    total_type_aliases: ~30
    total_enums: ~10
    total_zod_schemas: ~40
    total_helper_functions: ~15
