[package]
name = "claude-code-native"
version = "0.1.0"
edition = "2021"
authors = ["ebowwa"]
description = "Native modules for Claude Code Remake"

[lib]
crate-type = ["cdylib"]

[package.metadata.napi]
additional-flags = ["--no-const-enum"]

[[package.metadata.napi.binaries]]
name = "claude-code-native"
package = "claude-code-native"

[dependencies]
napi = { version = "2", features = ["async", "tokio_rt"] }
napi-derive = "2"
tokio = { version = "1", features = ["full"] }
lazy_static = "1"
grep = "0.3"
grep-regex = "0.1"
grep-searcher = "0.1"
ignore = "0.4"
glob = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
sha2 = "0.10"
md-5 = "0.10"
twox-hash = "1"
xxhash-rust = { version = "0.8", features = ["xxh3", "xxh64"] }
hex = "0.4"
syntect = "5"
tree-sitter = "0.20"
tree-sitter-typescript = "0.20"
tree-sitter-javascript = "0.20"
tree-sitter-python = "0.20"
tree-sitter-rust = "0.20"
tree-sitter-go = "0.20"
tree-sitter-c = "0.20"
tree-sitter-cpp = "0.20"
tree-sitter-java = "0.20"
tree-sitter-ruby = "0.20"
tree-sitter-php = "0.20"
path-clean = "1"
regex = "1"
similar = "2"

# Memory-mapped files
memmap2 = "0.9"

# Terminal Input & TUI
crossterm = { version = "0.28", features = ["events"] }
ratatui = { version = "0.29", features = ["crossterm"] }

# File system traversal
walkdir = "2"

# File watching
notify = { version = "6", features = ["macos_kqueue"] }
crossbeam-channel = "0.5"

# Cognitive Security
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }

[build-dependencies]
napi-build = "2"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = true
opt-level = 3
strip = true
