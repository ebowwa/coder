name: Deploy to VPS

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'assignments/**'
      - 'docs/**'
      - '*.md'
      - '.claude/**'
      - 'memory/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to seed-node-prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            export PATH="$HOME/.cargo/bin:$HOME/.bun/bin:$PATH"

            echo "=== Coder VPS Deploy ==="
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            cd /root/packages

            TARGET_BRANCH="${{ github.ref_name }}"

            # Fetch latest from origin
            git fetch origin

            # Force-sync to remote branch (VPS is a deployment target, not a dev machine)
            # bun install modifies bun.lock/package.json so plain git pull fails
            git checkout "$TARGET_BRANCH" 2>/dev/null || true
            git reset --hard "origin/$TARGET_BRANCH"

            # Install dependencies
            bun install

            # Build Rust native module (coder's own native)
            echo "Building Rust native module..."
            cd packages/rust && cargo build --release --target-dir ./target && cd ../..

            # Copy built .so directly to native/ (avoids napi CLI ESM issues on VPS)
            cp packages/rust/target/release/libclaude_code_native.so native/claude_code_native.linux-x64-gnu.node
            echo "Copied native binary to native/"

            # Build TypeScript bundle
            echo "Building TypeScript bundle..."
            bun run build:ts

            # Build type declarations
            bun run build:types

            # Link globally
            bun link

            # Verify
            echo "=== Deploy Complete ==="
            coder --version 2>/dev/null || echo "coder binary check failed"
            echo "Deployed: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
