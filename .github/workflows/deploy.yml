name: Deploy to VPS

on:
  push:
    branches: [dev]
    paths-ignore:
      - 'assignments/**'
      - 'docs/**'
      - '*.md'
      - '.claude/**'
      - 'memory/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to seed-node-prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            export PATH="$HOME/.bun/bin:$HOME/.local/bin:$PATH"

            echo "=== Coder VPS Deploy ==="
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # Clone or update coder repo
            if [ -d /root/coder ]; then
              cd /root/coder
              git fetch origin
              git reset --hard "origin/${{ github.ref_name }}"
            else
              git clone -b ${{ github.ref_name }} https://github.com/ebowwa/coder.git /root/coder
              cd /root/coder
            fi

            # Install dependencies
            bun install

            # Build Rust native module
            echo "Building Rust native module..."
            cd packages/rust && cargo build --release --target-dir ./target && cd ../..

            # Copy built .so to native/
            cp packages/rust/target/release/libclaude_code_native.so native/claude_code_native.linux-x64-gnu.node
            echo "Copied native binary to native/"

            # Build TypeScript bundle
            echo "Building TypeScript bundle..."
            bun run build:ts

            # Build type declarations
            bun run build:types

            # Install globally via bun
            bun install -g .

            # Verify
            echo "=== Deploy Complete ==="
            coder --version 2>/dev/null || echo "coder binary check failed"
            echo "Deployed: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
